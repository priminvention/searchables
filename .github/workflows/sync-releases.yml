name: Sync Releases to OSS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.8.1). Leave empty for latest.'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip tag filter for manual triggers
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.release.tag_name, 'v') ||
      contains(github.event.release.tag_name, 'desktop')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ inputs.tag }}"
            if [ -z "$INPUT_TAG" ]; then
              TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
              echo "Using latest release: $TAG"
            else
              TAG="$INPUT_TAG"
            fi
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets

          # Check if desktop artifacts exist
          DESKTOP_FILES=$(ls release-assets/*.dmg release-assets/*-setup.exe release-assets/latest*.yml 2>/dev/null | wc -l)
          if [ "$DESKTOP_FILES" -eq 0 ]; then
            echo "No desktop artifacts found, skipping sync."
            exit 0
          fi

          echo "Found $DESKTOP_FILES desktop artifacts:"
          ls -lh release-assets/

      - name: Sync to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET_NAME: ${{ vars.OSS_BUCKET_NAME }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
        run: bun scripts/sync-to-oss.ts release-assets/
